<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- 奢华黑金背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    
    <!-- 精致金渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCEABB"/>
      <stop offset="40%" stop-color="#F8B500"/>
      <stop offset="100%" stop-color="#B27E02"/>
    </linearGradient>

    <!-- 背景微投影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    
    <!-- 金色微发光 -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. 黑色圆角底框 -->
  <rect x="12" y="12" width="72" height="72" rx="18" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 2. 金色装饰外框 -->
  <rect x="10" y="10" width="76" height="76" rx="20" fill="none" stroke="url(#goldGrad)" stroke-opacity="0.3" stroke-width="2"/>

  <!-- 3. 居中用户标识（金色） -->
  <!-- 用户头部 -->
  <circle cx="48" cy="34" r="10" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  
  <!-- 用户身体 -->
  <path d="M 32 58 C 32 46, 64 46, 64 58" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round" filter="url(#goldGlow)"/>
</svg>