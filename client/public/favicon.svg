<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- 黑子渐变（扁平且有层次） -->
    <radialGradient id="blackStone" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    
    <!-- 白子渐变（干净通透） -->
    <radialGradient id="whiteStone" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </radialGradient>

    <!-- 柔和阴影（保持扁平感与立体感） -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 1. Logo 浅色底板 -->
  <rect x="6" y="6" width="84" height="84" rx="20" fill="#F9FAFB"/>
  
  <!-- 2. 底板装饰外圈 -->
  <rect x="4" y="4" width="88" height="88" rx="22" fill="none" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- 3. 底部细微网格（围棋元素） -->
  <g stroke="#CBD5E1" stroke-width="1.5" opacity="0.8">
    <!-- 纵线 -->
    <line x1="24" y1="16" x2="24" y2="80"/>
    <line x1="40" y1="16" x2="40" y2="80"/>
    <line x1="56" y1="16" x2="56" y2="80"/>
    <line x1="72" y1="16" x2="72" y2="80"/>
    
    <!-- 横线 -->
    <line x1="16" y1="24" x2="80" y2="24"/>
    <line x1="16" y1="40" x2="80" y2="40"/>
    <line x1="16" y1="56" x2="80" y2="56"/>
    <line x1="16" y1="72" x2="80" y2="72"/>
  </g>

  <!-- 4. 黑子（位于左侧下方） -->
  <circle cx="34" cy="48" r="20" fill="url(#blackStone)" filter="url(#soft-shadow)" stroke="#000000" stroke-width="0.5"/>
  
  <!-- 5. 白子压黑子（位于右侧上方） -->
  <circle cx="62" cy="48" r="20" fill="url(#whiteStone)" filter="url(#soft-shadow)" stroke="#CBD5E1" stroke-width="0.5"/>
  
  <!-- 6. 高光点缀（提升扁平感下的精致度） -->
  <circle cx="56" cy="42" r="3" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="30" cy="42" r="2.5" fill="#FFFFFF" opacity="0.3"/>
</svg>