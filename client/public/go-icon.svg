<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- 全局投影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- 内阴影滤镜（增加棋盘深度感） -->
    <filter id="inner-shadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <!-- 棋盘背景渐变（橘黄色系） -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB703"/>
      <stop offset="50%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>

    <!-- 黑子渐变（曜石黑质感） -->
    <radialGradient id="blackStone" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="40%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- 白子渐变（玉润质感） -->
    <radialGradient id="whiteStone" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </radialGradient>
  </defs>

  <!-- 1. Logo 深色基底（圆角底板） -->
  <rect x="2" y="2" width="92" height="92" rx="20" fill="#1C1917" filter="url(#shadow)"/>
  
  <!-- 2. 底板的装饰性金边 -->
  <rect x="2" y="2" width="92" height="92" rx="20" fill="none" stroke="#FFB703" stroke-width="1.5" opacity="0.3"/>

  <!-- 3. 装饰性外环（提升 Logo 设计感） -->
  <circle cx="48" cy="48" r="40" fill="none" stroke="#FFB703" stroke-width="1" opacity="0.2"/>
  <circle cx="48" cy="48" r="36" fill="none" stroke="#FFB703" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 4"/>

  <!-- 4. 橘黄色围棋棋盘主体 -->
  <rect x="16" y="16" width="64" height="64" rx="6" fill="url(#boardGrad)" filter="url(#inner-shadow)"/>

  <!-- 5. 棋盘网格线（5x5 经典布局） -->
  <!-- 网格线从 20 到 76，间隔 14px -->
  <g stroke="#FFF8E7" stroke-width="1.2" stroke-linecap="round" opacity="0.8">
    <!-- 纵线 -->
    <line x1="20" y1="20" x2="20" y2="76"/>
    <line x1="34" y1="20" x2="34" y2="76"/>
    <line x1="48" y1="20" x2="48" y2="76"/>
    <line x1="62" y1="20" x2="62" y2="76"/>
    <line x1="76" y1="20" x2="76" y2="76"/>
    
    <!-- 横线 -->
    <line x1="20" y1="20" x2="76" y2="20"/>
    <line x1="20" y1="34" x2="76" y2="34"/>
    <line x1="20" y1="48" x2="76" y2="48"/>
    <line x1="20" y1="62" x2="76" y2="62"/>
    <line x1="20" y1="76" x2="76" y2="76"/>
  </g>

  <!-- 6. 棋子布局（天元黑子 + 四星位交互落子） -->
  
  <!-- 天元（中心点）黑子 -->
  <circle cx="48" cy="48" r="7" fill="url(#blackStone)" filter="url(#shadow)"/>
  
  <!-- 左上角星位黑子 -->
  <circle cx="34" cy="34" r="7" fill="url(#blackStone)" filter="url(#shadow)"/>
  
  <!-- 右上角星位白子 -->
  <circle cx="62" cy="34" r="7" fill="url(#whiteStone)" filter="url(#shadow)"/>
  
  <!-- 左下角星位黑子 -->
  <circle cx="34" cy="62" r="7" fill="url(#blackStone)" filter="url(#shadow)"/>
  
  <!-- 右下角星位白子 -->
  <circle cx="62" cy="62" r="7" fill="url(#whiteStone)" filter="url(#shadow)"/>

  <!-- 7. 棋子高光增强（让棋子更立体） -->
  <!-- 黑子高光 -->
  <circle cx="45" cy="45" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="31" cy="31" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="31" cy="59" r="2" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- 白子高光 -->
  <circle cx="59" cy="31" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="59" cy="59" r="2" fill="#FFFFFF" opacity="0.8"/>
</svg>