<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <!-- 背景渐变（现代科技蓝紫色） -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    
    <!-- 柔和投影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 1. Logo 底板（圆角方形，图标风格） -->
  <rect x="12" y="12" width="72" height="72" rx="18" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 2. 装饰性外圈（增加图标精致感） -->
  <rect x="10" y="10" width="76" height="76" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>

  <!-- 3. 用户头像区域（完全居中） -->
  <!-- 用户头部 -->
  <circle cx="48" cy="34" r="10" fill="#FFFFFF"/>
  
  <!-- 用户身体 -->
  <path d="M 32 58 C 32 46, 64 46, 64 58" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
</svg>