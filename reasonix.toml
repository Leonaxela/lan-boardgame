# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git tag -d finish-katago-analysis ; git push origin :refs/tags/finish-katago-analysis)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git push origin :refs/tags/finish-katago-analysis)", "Bash(Select-String \"ws::*)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; $content = [System.IO.File]::ReadAllText('server/src/websocket/Dispatcher.ts') ; $content = $content.Replace('ws: null as any', 'ws: null!') ; [System.IO.File]::WriteAllText('server/src/websocket/Dispatcher.ts', $content))", "Bash(Select-String \"moveHistory\":*)", "Bash(Select-String \"board\":*)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git diff --stat server/src/)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; npx tsc --noEmit --project server/tsconfig.json 2>&1 | Select-String \"error TS\" | Measure-Object -Line)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; npx tsc --noEmit --project server/tsconfig.json 2>&1)", "Bash(Select-String \"GomokuExtraState\":*)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git add -A ; git commit -m \"refactor: 代码质量优化（消除 as any、空 catch、DB 类型安全）\n\n- Room 类添加 7 个正式属性，消除 Dispatcher 中 35 处 (room as any)\n- 所有空 catch {} 块添加错误日志\n- queryAll/queryOne 泛型类型支持\n- 新增 sql.js 类型声明\n- 修复 draughts/gomoku 类型错误\")", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git log --oneline -3)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git push)", "Bash(Select-String \"private.*handle|private.*send|private.*get|private.*log|private.*start|private.*schedule|private.*save|private.*generate|private.*enrich\" \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\\server\\src\\websocket\\Dispatcher.ts\")", "Bash(Select-String \"//:*)", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; (Get-Content server/src/websocket/Dispatcher.ts | Measure-Object -Line).Lines)", "Bash(New-Item -ItemType Directory -Force -Path \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\\server\\src\\websocket\\handlers\" | Out-Null ; New-Item -ItemType Directory -Force -Path \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\\server\\src\\websocket\\records\\generators\" | Out-Null ; Write-Host \"OK\")", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; npx tsc --noEmit --project server/tsconfig.json 2>&1 ; Write-Host \"DONE\")", "Bash(cd \"D:\\Program Files\\Reasonix\\workspace\\lan-boardgame\" ; git add -A ; git commit -m \"refactor: 拆分 Dispatcher.ts（74KB → 14个文件）\n\n- 新增 types.ts / utils.ts 共享类型和工具函数\n- 按功能拆分为 handlers/RoomHandler、GameHandler、AIHandler、KataGoHandler、ChallengeHandler\n- 按游戏拆出 records/GameRecordSaver + 4个棋谱生成器（SGF/中国象棋PGN/国际象棋PGN/跳棋PDN）\n- Dispatcher.ts 精简为纯分发器（74KB → 2.4KB）\n- .gitignore 添加 reasonix.toml\")"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
